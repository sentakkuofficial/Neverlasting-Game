<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Neverlasting: Origins Story RPG</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="game-box">
    <h1>Neverlasting: Origins</h1>
    <h2 id="levelTitle">Story RPG</h2>

    <div id="introScreen">
      <p>
        Ichido wakes inside the Grand Selection. Every choice matters.
        Some people can be saved. Some deaths are inevitable.
      </p>
      <button onclick="startGame()">Begin Story</button>
    </div>

    <div id="gameScreen" class="hidden">
      <section id="story"></section>

      <section class="stats-grid">
        <div class="stat-card">
          <h3>Ichido</h3>
          <p>HP: <span id="playerHp">100</span></p>
          <p>Fear: <span id="fear">15</span></p>
          <p>Stamina: <span id="stamina">N/A</span></p>
          <p>Potions: <span id="potions">None</span></p>
        </div>

        <div class="stat-card enemy">
          <h3 id="enemyName">The Grand Selection</h3>
          <p>Enemy HP: <span id="enemyHp">???</span></p>
          <p>Intent: <span id="enemyIntent">Unknown</span></p>
          <p>Status: <span id="enemyStatus">Story Mode</span></p>
        </div>
      </section>

      <section class="buttons"></section>

      <section id="message"></section>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
